name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  corpus-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Resolve corpus manifest path
        id: corpus_manifest
        shell: bash
        run: |
          today_manifest="catalog-scraper/regression-corpus/$(date -u +%F)/manifest.json"
          if [ -f "$today_manifest" ]; then
            echo "path=$today_manifest" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_manifest=$(find catalog-scraper/regression-corpus -maxdepth 2 -type f -name manifest.json | sort -r | head -n 1)
          if [ -z "$latest_manifest" ]; then
            echo "No regression corpus manifest found." >&2
            exit 1
          fi

          echo "path=$latest_manifest" >> "$GITHUB_OUTPUT"

      - name: Verify corpus baseline
        run: npm run corpus:verify -- --current "${{ steps.corpus_manifest.outputs.path }}"

      - name: Check corpus quality thresholds
        run: npm run corpus:quality:check -- --manifest "${{ steps.corpus_manifest.outputs.path }}"

  frontend:
    needs: corpus-guard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
